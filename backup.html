<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAS 2026 Intel Backup</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#f0f0f0;font-family:'DM Sans',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#1a1f2e;border-radius:12px;padding:32px;max-width:420px;width:100%;text-align:center}
h1{font-size:20px;margin-bottom:4px}
.sub{color:#64748b;font-size:13px;margin-bottom:24px}
.btn{background:#E8553A;color:#fff;border:none;padding:14px 28px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;width:100%}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.status{margin-top:16px;font-size:13px;color:#94a3b8;min-height:20px}
.status.err{color:#ef4444}
.status.ok{color:#22c55e}
.count{font-size:32px;font-weight:700;color:#E8553A;margin:16px 0 4px}
.count-label{font-size:12px;color:#64748b;margin-bottom:20px}
</style>
</head>
<body>
<div class="card">
  <h1>SAS 2026 Intel Backup</h1>
  <div class="sub">Download all intel notes as CSV</div>
  <div class="count" id="rowCount">—</div>
  <div class="count-label">rows in database</div>
  <button class="btn" id="dlBtn" onclick="doBackup()">Download CSV</button>
  <div class="status" id="status"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://hgsevkvwaaurvueztbuo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_D4FTKzF4TBDgYIm85LKn3w_hI5BtoQY';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// On load, show row count
(async function(){
  try {
    const { count, error } = await db.from('intel').select('*', { count: 'exact', head: true });
    if(!error) document.getElementById('rowCount').textContent = count;
  } catch(e){}
})();

function escCSV(val){
  if(val == null) return '';
  var s = String(val);
  if(s.indexOf(',') !== -1 || s.indexOf('"') !== -1 || s.indexOf('\n') !== -1){
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

async function doBackup(){
  var btn = document.getElementById('dlBtn');
  var status = document.getElementById('status');
  btn.disabled = true;
  btn.textContent = 'Fetching...';
  status.textContent = '';
  status.className = 'status';

  try {
    var { data, error } = await db.from('intel')
      .select('id, person_name, note, sentiment, author, created_at')
      .order('created_at', { ascending: false });

    if(error) throw new Error(error.message);

    var headers = ['id','person_name','note','sentiment','author','created_at'];
    var lines = [headers.join(',')];
    data.forEach(function(row){
      lines.push(headers.map(function(h){ return escCSV(row[h]); }).join(','));
    });
    var csv = lines.join('\n');

    // Trigger download
    var blob = new Blob([csv], { type: 'text/csv' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    var ts = new Date().toISOString().slice(0,16).replace(/[T:]/g, '-');
    a.href = url;
    a.download = 'sas2026-intel-backup-' + ts + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    status.textContent = 'Downloaded ' + data.length + ' rows.';
    status.className = 'status ok';
    document.getElementById('rowCount').textContent = data.length;
  } catch(err){
    status.textContent = 'Error: ' + err.message;
    status.className = 'status err';
  }

  btn.disabled = false;
  btn.textContent = 'Download CSV';
}
</script>
</body>
</html>
