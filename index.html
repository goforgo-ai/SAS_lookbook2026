ia-class", "Connecticut", "workforce"]}, {"name": "Congresswoman Jen Kiggans (VA-02)", "title": "Member, House Armed Services Committee", "category": "Congressional Stakeholders", "session": "Congressional Panel: Investing in the Maritime Workforce", "bio": "A former Navy helicopter pilot representing the Virginia Beach/Norfolk area, Kiggans is a vocal advocate for naval aviation and shipyard infrastructure.", "news": ["Sponsoring legislation to increase 'Quality of Life' funding for sailors in Norfolk shipyards.", "Advocating for a 3% increase in the Navy's aviation maintenance budget in the 2027 NDAA.", "Recently visited naval facilities in Japan to assess forward-deployed readiness.", "Championing the 'Military Spouse Employment' initiative within the defense industrial base."], "tags": ["Congress", "HASC", "aviation", "Norfolk", "shipyard", "workforce", "Virginia", "military spouse", "helicopter"]}, {"name": "Congressman Donald Norcross (NJ-01)", "title": "Ranking Member, Tactical Air and Land Forces Subcommittee", "category": "Congressional Stakeholders", "session": "Panel: The Industrial Base – Can We Build What We Need?", "bio": "Norcross is a key player in aviation procurement, focusing on the industrial base's ability to scale production for F-35s and munitions.", "news": ["Pushing for 'Munitions Requirements' reform for adequate stocks of long-range missiles.", "Focused on the 'Skilled Trades Gap' in the defense industrial base, particularly in welding and electronics.", "Recently led a CODEL to assess European theater's demand for U.S. naval air power.", "Advocating for 'Multi-Year Procurement' of tactical aircraft to drive down unit costs."], "tags": ["Congress", "tactical air", "F-35", "munitions", "industrial base", "skilled trades", "multi-year procurement", "New Jersey"]}, {"name": "Ms. Tara Murphy Dougherty", "title": "CEO, Govini", "category": "Govini Leadership", "session": "Moderator: Fireside Chat with Vice Admiral Robert Gaucher / Panel: Accele const CAT_COLORS={"DON Senior Leaders":"#E8553A","PAE PEO Procurers":"#D97706","OPNAV & Fleet Leaders":"#2563EB","Marine Corps Stakeholders":"#B91C1C","US Coast Guard":"#0369A1","Congressional Stakeholders":"#6D28D9","Govini Leadership":"#E8553A"};
const CATEGORIES=[...new Set(PEOPLE.map(p=>p.category))];
let query="",catFilter=null,expandedIdx=null;

function hl(text,q){
  if(!q||q.length<2)return text;
  try{
    var e=q.replace(/[-\/\\^$*+?.()|[\]{}]/g, String.fromCharCode(92)+'$&');
    return text.replace(new RegExp('('+e+')','gi'),'<mark>$1</mark>');
  }catch(err){return text;}
}

function getInitials(name){
  return name.replace(/^(Hon\.|Mr\.|Ms\.|ADM|VADM|RADM|RDML|BGen|General|Congressman|Congresswoman)\s*/i,'')
    .split(' ').filter(function(w){return w.length>1&&w[0]===w[0].toUpperCase()}).slice(0,2).map(function(w){return w[0]}).join('');
}

function renderPills(){
  var c=document.getElementById('pills');
  var h='<button class="pill" style="background:'+(catFilter===null?'#E8553A':'#1a1f2e')+';color:'+(catFilter===null?'#fff':'#94a3b8')+'" onclick="setCat(null)">All</button>';
  CATEGORIES.forEach(function(cat){
    var active=catFilter===cat;
    var esc=cat.replace(/'/g,"\\'");
    h+='<button class="pill" style="background:'+(active?CAT_COLORS[cat]:'#1a1f2e')+';color:'+(active?'#fff':'#94a3b8')+'" onclick="setCat(\''+esc+'\')">'+cat+'</button>';
  });
  c.innerHTML=h;
}

function doFilter(){
  var list=PEOPLE.slice();
  if(catFilter)list=list.filter(function(p){return p.category===catFilter});
  if(query.trim()){
    var words=query.toLowerCase().trim().split(/\s+/);
    list=list.filter(function(p){
      var s=[p.name,p.title,p.category,p.session,p.bio].concat(p.news).concat(p.tags).join(' ').toLowerCase();
      return words.every(function(w){return s.indexOf(w)!==-1});
    });
  }
  return list;
}

function renderCards(){
  var list=doFilter();
  var r=document.getElementById('results');
  var h='<div class="count">'+list.length+' '+(list.length===1?'person':'people')+(query?' matching "'+query+'"':'')+'</div>';
  if(list.length===0){
    h+='<div class="empty"><div style="font-size:32px;margin-bottom:8px">&#9875;</div><div style="font-size:14px">No matches found</div><div style="font-size:12px;margin-top:4px">Try broader keywords</div></div>';
    r.innerHTML=h;return;
  }
  list.forEach(function(p){
    var gIdx=PEOPLE.indexOf(p);
    var exp=expandedIdx===gIdx;
    var cc=CAT_COLORS[p.category]||'#666';
    var photo=PHOTOS[p.name];
    var sz=exp?64:44;
    var avatar;
    if(photo){
      avatar='<img class="avatar" src="data:image/jpeg;base64,'+photo+'" style="width:'+sz+'px;height:'+sz+'px;border:2px solid '+cc+'">';
    }else{
      avatar='<div class="avatar-init" style="width:'+sz+'px;height:'+sz+'px;background:'+cc+';font-size:'+(exp?20:14)+'px">'+getInitials(p.name)+'</div>';
    }
    h+='<div class="card" style="background:'+(exp?'#1a1f2e':'#141824')+';border-left:3px solid '+cc+'" onclick="toggle('+gIdx+')">';
    h+='<div class="card-top">'+avatar+'<div class="card-info"><div class="card-name-row"><span class="card-name">'+hl(p.name,query)+'</span>';
    if(p.isCustomer)h+='<span class="cust-badge">CUSTOMER</span>';
    h+='</div><div class="card-title">'+hl(p.title,query)+'</div></div>';
    h+='<span class="chevron" style="transform:rotate('+(exp?180:0)+'deg)">\u25BE</span></div>';
    if(exp){
      h+='<div class="detail">';
      h+='<div class="detail-section"><div class="detail-label" style="color:'+cc+'">SESSION</div><div class="detail-text">'+hl(p.session,query)+'</div></div>';
      h+='<div class="detail-section"><div class="detail-label" style="color:'+cc+'">BIO</div><div class="detail-text">'+hl(p.bio,query)+'</div></div>';
      h+='<div><div class="detail-label" style="color:'+cc+'">RECENT NEWS</div>';
      p.news.forEach(function(n){
        h+='<div class="news-item"><span class="news-bullet" style="color:'+cc+'">\u203A</span>'+hl(n,query)+'</div>';
      });
      h+='</div></div>';
    }
    h+='</div>';
  });
  r.innerHTML=h;
}

function toggle(idx){expandedIdx=expandedIdx===idx?null:idx;renderCards();}
function setCat(c){catFilter=c;expandedIdx=null;renderPills();renderCards();}
function clearSearch(){query="";document.getElementById('search').value="";document.getElementById('clearBtn').style.display='none';expandedIdx=null;renderCards();}

document.getElementById('search').addEventListener('input',function(e){
  query=e.target.value;
  document.getElementById('clearBtn').style.display=query?'flex':'none';
  expandedIdx=null;
  renderCards();
});

renderPills();
renderCards();

</script>
</body>
</html>
